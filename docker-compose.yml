version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: problem-finder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: problem_finder_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: problem-finder-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  postgres_data:

